<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<section id="banner" class="container">
    <img src="./imagens/logo.png" alt="Super Mario Bros">
</section>

<section id="inicio" class="container">
    <a href="#personagens" class="botao">Novo jogo</a>
    <a href="#personagens" class="botao">Carregar jogo</a>
</section>

<section id="personagens" class="container">
    <h2>Escolha seu personagem</h2>
    <div class="personagens-lista">
        <div class="personagens-item">
            <img src="imagens/personagens/mario.jpg" alt="Mario">
            <h4>Mario</h4>
        </div>

        <div class="personagens-item">
            <img src="imagens/personagens/luigi.jpg" alt="luigi">
            <h4>luigi</h4>
        </div>

        <div class="personagens-item">
            <img src="imagens/personagens/toad.jpg" alt="Toad">
            <h4>Toad</h4>
        </div>

        <div class="personagens-item">
            <img src="imagens/personagens/yoshi.jpg" alt="Yoshi">
            <h4>yoshi</h4>
        </div>
    </div>
</section>

<section id="poderes" class="container">
    <h2>Colete poderes especiais</h2>
    <div class="poderes-lista">
        <div class="poderes-item">
            <img src="imagens/poderes/cogumelo-vermelho.jpg" alt="cogumelo-vermelho">
            <h4>cogumelo-vermelho</h4>
        </div>

        <div class="poderes-item">
            <img src="imagens/poderes/cogumelo-azul.jpg" alt="luigi">
            <h4>cogumelo-azul</h4>
        </div>

        <div class="poderes-item">
            <img src="imagens/poderes/cogumelo-verde.jpg" alt="Toad">
            <h4>cogumelo-verde</h4>
        </div>

        <div class="poderes-item">
            <img src="imagens/poderes/cogumelo-voador.jpg" alt="Yoshi">
            <h4>cogumelo-voador</h4>
        </div>

        <div class="poderes-item">
            <img src="imagens/poderes/estrela.jpg" alt="Yoshi">
            <h4>estrela</h4>
        </div>
        <div class="poderes-item">
            <img src="imagens/poderes/flor-fogo.jpg" alt="Yoshi">
            <h4>flor-fogo</h4>
        </div>
        <div class="poderes-item">
            <img src="imagens/poderes/flor-gelo.jpg" alt="Yoshi">
            <h4>flor gelo</h4>
        </div>
        <div class="poderes-item">
            <img src="imagens/poderes/pinguim.jpg" alt="Yoshi">
            <h4>pinguim</h4>
        </div>
    </div>
</section>

</body>
</html>
